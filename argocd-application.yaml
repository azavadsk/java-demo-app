apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/azavadsk/argocd
    targetRevision: main
    path: java-demo-app
  destination:
    server: https://kubernetes.default.svc
    namespace: java-demo-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
