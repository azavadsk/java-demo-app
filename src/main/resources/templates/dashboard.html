<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Java Demo App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .header .badge {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            background: #22c55e22;
            color: #22c55e;
            border: 1px solid #22c55e44;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: #1e2130;
            border: 1px solid #2d3148;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
        }

        .card .label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
            margin-bottom: 0.4rem;
        }

        .card .value {
            font-size: 1.05rem;
            font-weight: 500;
            color: #e2e8f0;
            word-break: break-all;
        }

        .card .value.highlight {
            color: #60a5fa;
        }

        .card .value.green {
            color: #22c55e;
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #374151;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Java Demo App</h1>
    <span class="badge">RUNNING</span>
</div>

<div class="grid">
    <div class="card">
        <div class="label">Version</div>
        <div class="value highlight" th:text="${version}"></div>
    </div>
    <div class="card">
        <div class="label">Uptime</div>
        <div class="value green" th:text="${uptime}"></div>
    </div>
    <div class="card">
        <div class="label">Pod Name</div>
        <div class="value" th:text="${podName}"></div>
    </div>
    <div class="card">
        <div class="label">Namespace</div>
        <div class="value" th:text="${namespace}"></div>
    </div>
    <div class="card">
        <div class="label">Hostname</div>
        <div class="value" th:text="${hostname}"></div>
    </div>
    <div class="card">
        <div class="label">Java Version</div>
        <div class="value" th:text="${javaVersion}"></div>
    </div>
    <div class="card">
        <div class="label">CPU Cores</div>
        <div class="value" th:text="${cpus}"></div>
    </div>
    <div class="card">
        <div class="label">Memory</div>
        <div class="value" th:text="${memFree} + ' free / ' + ${memTotal}"></div>
    </div>
</div>

<div class="footer">Smiths Detection — ELECTORA PSA Demo</div>

</body>
</html>
